<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StressCare - Create New Password</title>
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/fp.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="phone-frame">
    <div class="fp-screen">

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="status-time">10:30</span>
        <div class="status-icons">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-three-quarters"></i>
          <span class="battery-text">88%</span>
        </div>
      </div>

      <!-- Logo -->
      <div class="fp-logo">
        <img src="../images/logo.png" alt="StressCare Logo">
      </div>

      <!-- Title + Illustration row -->
      <div class="fp-top">
        <div class="fp-title-block">
          <h1 class="fp-title">Create New<br>Password</h1>
          <p class="fp-subtitle">Enter and confirm your new password to update your account securely.</p>
        </div>
        <div class="fp-illus-wrap">
          <div class="fp-illus-bubble">
            <img src="../images/onboarding3.png" alt="Illustration" class="fp-illus">
          </div>
        </div>
      </div>

      <!-- White Card -->
      <div class="fp-card fp-card-tall">

        <!-- New Password -->
        <div class="fp-field-label">New Password</div>
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="pwd1" placeholder="Enter new password">
          <button class="eye-btn" onclick="togglePwd('pwd1', this)" tabindex="-1">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <!-- Confirm New Password -->
        <div class="fp-field-label">Confirm New Password</div>
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="pwd2" placeholder="Confirm new password">
          <button class="eye-btn" onclick="togglePwd('pwd2', this)" tabindex="-1">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <!-- Update Password -->
        <button class="btn-primary-auth" id="updateBtn" onclick="handleUpdate()" style="margin-top:8px;">
          Update Password
        </button>

        <!-- Back to Login -->
        <div class="fp-back-link">
          <a href="login.html">Back to Login</a>
        </div>

      </div>

      <!-- Hint -->
      <div class="fp-hint">
        <div class="hint-icon hint-green">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <span class="hint-text">Choose a strong password for better account security.</span>
      </div>

      <!-- Home bar -->
      <div class="home-bar"></div>

    </div>
  </div>

  <script>
    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-regular fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-regular fa-eye';
      }
    }

    function handleUpdate() {
      const p1 = document.getElementById('pwd1').value;
      const p2 = document.getElementById('pwd2').value;
      if (!p1 || !p2) return;
      if (p1 !== p2) {
        document.getElementById('pwd2').style.borderColor = '#ef4444';
        return;
      }
      const btn = document.getElementById('updateBtn');
      btn.textContent = 'Password Updated!';
      btn.style.background = '#16a34a';
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1200);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StressCare - Forgot Password</title>
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/fp.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="phone-frame">
    <div class="fp-screen">

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="status-time">10:30</span>
        <div class="status-icons">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-three-quarters"></i>
          <span class="battery-text">88%</span>
        </div>
      </div>

      <!-- Logo -->
      <div class="fp-logo">
        <img src="../images/logo.png" alt="StressCare Logo">
      </div>

      <!-- Title + Illustration row -->
      <div class="fp-top">
        <div class="fp-title-block">
          <h1 class="fp-title">Forgot<br>Password</h1>
          <p class="fp-subtitle">Enter your registered email address and we will send you a password reset link.</p>
        </div>
        <div class="fp-illus-wrap">
          <div class="fp-illus-bubble">
            <img src="../images/onboarding3.png" alt="Illustration" class="fp-illus">
          </div>
        </div>
      </div>

      <!-- White Card -->
      <div class="fp-card">

        <!-- Email -->
        <div class="input-group">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="email" placeholder="Email Address" autocomplete="email">
        </div>

        <!-- Send Reset Link -->
        <button class="btn-primary-auth" id="sendBtn" onclick="handleSend()">
          Send Reset Link
        </button>

        <!-- Back to Login -->
        <div class="fp-back-link">
          <a href="login.html">Back to Login</a>
        </div>

      </div>

      <!-- Hint -->
      <div class="fp-hint">
        <div class="hint-icon hint-teal">
          <i class="fa-regular fa-envelope"></i>
        </div>
        <span class="hint-text" id="hintText">Check your inbox after submitting your email.</span>
      </div>

      <!-- Home bar -->
      <div class="home-bar"></div>

    </div>
  </div>

  <script>
    function handleSend() {
      const email = document.getElementById('email').value;
      if (!email) {
        document.getElementById('email').focus();
        return;
      }
      const btn = document.getElementById('sendBtn');
      btn.textContent = 'Link Sent!';
      btn.style.background = '#16a34a';
      document.getElementById('hintText').textContent = 'Reset link sent! Please check your inbox.';
      setTimeout(() => {
        window.location.href = 'reset-password.html';
      }, 1200);
    }
  </script>

</body>
</html>

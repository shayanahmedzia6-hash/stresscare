<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StressCare - Onboarding</title>
  <link rel="stylesheet" href="../css/onboarding.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="phone-frame">
    <div class="ob-screen">

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="status-time">10:30</span>
        <div class="status-icons">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-three-quarters"></i>
          <span class="battery-text">88%</span>
        </div>
      </div>

      <!-- Header: Logo + Skip -->
      <div class="ob-header">
        <div class="logo-wrap">
          <img src="../images/logo.png" alt="StressCare Logo">
        </div>
        <a href="onboarding-2.html" class="skip-btn">Skip</a>
      </div>

      <!-- Title -->
      <div class="ob-text">
        <h1 class="ob-title">Track Your Stress<br>in Real Time</h1>
        <p class="ob-subtitle">Monitor heart rate, GSR, skin temperature<br>and motion using your wearable device.</p>
      </div>

      <!-- Illustration -->
      <div class="illustration-wrap">
        <img src="../images/onboarding1.png" alt="Person with smartwatch" class="ob-illus-full">
      </div>

      <!-- Footer -->
      <div class="ob-footer">
        <div class="dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <a href="onboarding-2.html" class="btn-next">
          Next <i class="fa-solid fa-chevron-right"></i>
        </a>
      </div>

    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StressCare</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f4f7fb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Subtle background blobs */
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(66,133,244,0.08) 0%, transparent 70%);
      top: -150px; right: -100px;
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(175,82,222,0.07) 0%, transparent 70%);
      bottom: -120px; left: -80px;
      border-radius: 50%;
      pointer-events: none;
    }

    .landing-wrapper {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      width: 100%;
      max-width: 860px;
    }

    /* Brand */
    .brand { margin-bottom: 2.8rem; }

    .brand-logo {
      height: 64px;
      width: auto;
      object-fit: contain;
      margin-bottom: 0.8rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .brand h1 {
      font-size: 2.6rem;
      font-weight: 800;
      color: #1a237e;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    .brand h1 .highlight {
      background: linear-gradient(90deg, #4285F4, #AF52DE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand p {
      color: #6b7ca0;
      font-size: 1rem;
      margin-top: 0.6rem;
      font-weight: 500;
    }

    /* Cards */
    .cards-row {
      display: flex;
      gap: 1.8rem;
      justify-content: center;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .app-card {
      background: #ffffff;
      border: 1.5px solid #e8edf5;
      border-radius: 24px;
      padding: 2.8rem 2.2rem;
      width: 320px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .app-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    .app-card.mobile:hover { border-color: #4285F4; box-shadow: 0 20px 50px rgba(66,133,244,0.15); }
    .app-card.web:hover    { border-color: #AF52DE; box-shadow: 0 20px 50px rgba(175,82,222,0.15); }

    .card-icon-wrap {
      width: 84px; height: 84px;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem;
    }

    .app-card.mobile .card-icon-wrap {
      background: linear-gradient(135deg, #4285F4, #34A0D4);
      box-shadow: 0 8px 24px rgba(66,133,244,0.3);
    }

    .app-card.web .card-icon-wrap {
      background: linear-gradient(135deg, #AF52DE, #7B2FBE);
      box-shadow: 0 8px 24px rgba(175,82,222,0.3);
    }

    .card-label {
      font-size: 1.45rem;
      font-weight: 700;
      color: #1a237e;
    }

    .card-desc {
      font-size: 0.88rem;
      color: #6b7ca0;
      text-align: center;
      line-height: 1.6;
    }

    .card-btn {
      margin-top: 0.5rem;
      padding: 0.55rem 1.4rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .app-card.mobile .card-btn {
      background: #e8f0fe;
      color: #4285F4;
    }
    .app-card.mobile:hover .card-btn {
      background: #4285F4;
      color: white;
    }

    .app-card.web .card-btn {
      background: rgba(175,82,222,0.1);
      color: #AF52DE;
    }
    .app-card.web:hover .card-btn {
      background: #AF52DE;
      color: white;
    }

    /* Footer */
    .footer-text {
      margin-top: 2.8rem;
      color: #9fa8b8;
      font-size: 0.8rem;
    }

    @media (max-width: 720px) {
      .brand h1 { font-size: 2rem; }
      .app-card { width: 100%; max-width: 340px; padding: 2.2rem 1.8rem; }
      .cards-row { gap: 1rem; }
    }
  </style>
  <script src="./lucide.min.js"></script>
  <script>window.addEventListener("load", function(){ if(window.lucide){ lucide.createIcons(); } });</script>
</head>
<body>
  <div class="landing-wrapper">

    <div class="brand">
      <img src="/images/logo.png" alt="StressCare" class="brand-logo">
    </div>

    <div class="cards-row">
      <a href="html/onboarding-1.html" class="app-card mobile">
        <div class="card-icon-wrap"><i data-lucide="smartphone" style="width:1em;height:1em;vertical-align:-0.125em;display:inline-block;"></i></div>
        <div class="card-label">Mobile App</div>
        <div class="card-desc">Full mobile experience with stress monitoring, interventions &amp; real-time tracking</div>
        <div class="card-btn">Launch App →</div>
      </a>

      <a href="webapp/admin-login.html" class="app-card web">
        <div class="card-icon-wrap"><i data-lucide="monitor" style="width:1em;height:1em;vertical-align:-0.125em;display:inline-block;"></i></div>
        <div class="card-label">Web App</div>
        <div class="card-desc">Desktop dashboard with detailed analytics, reports &amp; stress management tools</div>
        <div class="card-btn">Open Dashboard →</div>
      </a>
    </div>

    <div class="footer-text">StressCare &copy; 2025 &mdash; Your mental wellness companion</div>
  </div>
</body>
</html>

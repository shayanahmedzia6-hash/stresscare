<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StressCare – Admin Login</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #e8f0fe 0%, #dce8fb 30%, #e4eefe 60%, #f0f4ff 100%);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Background decorative blobs */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(66,133,244,0.12) 0%, transparent 70%);
      top: -120px; left: -120px;
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(66,133,244,0.08) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      border-radius: 50%;
      pointer-events: none;
    }

    /* ── Logo ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.6rem;
    }

    .brand-logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #4285F4, #34A0D4);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 6px 20px rgba(66,133,244,0.3);
    }

    .brand-info { display: flex; flex-direction: column; }
    .brand-name {
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a237e;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .brand-tagline {
      font-size: 0.72rem;
      color: #5c7cfa;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* ── Page heading ── */
    .page-heading {
      text-align: center;
      margin-bottom: 2rem;
    }
    .page-heading h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #1a237e;
      letter-spacing: -0.5px;
    }
    .page-heading p {
      font-size: 0.9rem;
      color: #5c6bc0;
      margin-top: 0.4rem;
    }

    /* ── Login Card ── */
    .login-card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(66,133,244,0.12), 0 4px 16px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 860px;
      display: flex;
      overflow: hidden;
      min-height: 400px;
    }

    /* ── Illustration Panel ── */
    .illus-panel {
      width: 340px;
      flex-shrink: 0;
      background: linear-gradient(145deg, #f0f7ff, #e3effd);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .illus-panel::before {
      content: '';
      position: absolute;
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(66,133,244,0.1) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      border-radius: 50%;
    }

    .shield-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* SVG Shield illustration */
    .shield-svg { filter: drop-shadow(0 12px 30px rgba(66,133,244,0.25)); }

    .illus-dots {
      position: absolute;
      top: 30px; right: 30px;
      display: grid;
      grid-template-columns: repeat(4, 8px);
      gap: 6px;
    }
    .illus-dots span {
      width: 8px; height: 8px;
      background: rgba(66,133,244,0.2);
      border-radius: 50%;
      display: block;
    }

    .illus-person {
      position: absolute;
      top: 40px; right: 50px;
      font-size: 2rem;
      opacity: 0.35;
    }

    .illus-gear {
      position: absolute;
      bottom: 60px; right: 35px;
      font-size: 1.6rem;
      opacity: 0.25;
      animation: spin 8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .illus-chart {
      position: absolute;
      bottom: 35px; left: 35px;
      font-size: 1.8rem;
      opacity: 0.3;
    }

    /* ── Form Panel ── */
    .form-panel {
      flex: 1;
      padding: 2.8rem 2.4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-group {
      margin-bottom: 1.3rem;
    }

    .form-label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #1a237e;
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: #9fa8da;
      font-size: 1rem;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      border: 1.5px solid #e3e8f5;
      border-radius: 12px;
      font-size: 0.92rem;
      color: #1a237e;
      background: #f8faff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      font-family: inherit;
    }

    .form-input::placeholder { color: #b0bec5; }

    .form-input:focus {
      border-color: #4285F4;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(66,133,244,0.1);
    }

    .pw-toggle {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: #9fa8da;
      font-size: 1rem;
      padding: 0;
      transition: color 0.2s;
      display: flex; align-items: center;
    }
    .pw-toggle:hover { color: #4285F4; }

    /* ── Row: remember + forgot ── */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.6rem;
      margin-top: -0.2rem;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .checkbox-wrap input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #4285F4;
      cursor: pointer;
    }

    .checkbox-wrap span {
      font-size: 0.84rem;
      color: #5c6bc0;
    }

    .forgot-link {
      font-size: 0.84rem;
      color: #4285F4;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: #1a73e8; text-decoration: underline; }

    /* ── Login Button ── */
    .btn-login {
      width: 100%;
      padding: 0.95rem;
      background: linear-gradient(135deg, #4285F4, #1a73e8);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      box-shadow: 0 6px 20px rgba(66,133,244,0.35);
      font-family: inherit;
      letter-spacing: 0.3px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(66,133,244,0.45);
    }

    .btn-login:active { transform: translateY(0); }

    /* ── Security note ── */
    .security-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.4rem;
      color: #4285F4;
      font-size: 0.8rem;
    }

    .security-note svg { flex-shrink: 0; }

    /* ── Error alert ── */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.84rem;
      margin-bottom: 1.2rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    .alert.error { background: #fce4e4; color: #c62828; border: 1px solid #ef9a9a; }
    .alert.show { display: flex; }

    /* ── Footer ── */
    .footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: #90a4ae;
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .illus-panel { display: none; }
      .form-panel { padding: 2rem 1.5rem; }
      .login-card { max-width: 420px; }
    }
  </style>
  <script src="../lucide.min.js"></script>
  <script>window.addEventListener("load", function(){ if(window.lucide){ lucide.createIcons(); } });</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="brand">
    <img src="../images/logo.png" alt="StressCare" style="height:48px;width:auto;object-fit:contain;display:block;margin:0 auto;">
  </div>

  <div class="page-heading">
    <h1>Admin Login</h1>
    <p>Secure access to your StressCare admin panel</p>
  </div>

  <div class="login-card">

    <!-- Illustration Panel -->
    <div class="illus-panel">
      <div class="illus-dots">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <span class="illus-person"><i data-lucide="user" style="width:1em;height:1em;vertical-align:-0.125em;display:inline-block;"></i></span>
      <span class="illus-gear"><i data-lucide="settings" style="width:1em;height:1em;vertical-align:-0.125em;display:inline-block;"></i></span>
      <span class="illus-chart"><i data-lucide="bar-chart-2" style="width:1em;height:1em;vertical-align:-0.125em;display:inline-block;"></i></span>

      <div class="shield-wrap">
        <svg class="shield-svg" width="200" height="230" viewBox="0 0 200 230" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shield body -->
          <path d="M100 10 L185 45 L185 115 C185 165 145 205 100 220 C55 205 15 165 15 115 L15 45 Z"
            fill="url(#shieldGrad)" opacity="0.18"/>
          <path d="M100 18 L178 50 L178 115 C178 160 142 197 100 212 C58 197 22 160 22 115 L22 50 Z"
            fill="url(#shieldGrad2)" stroke="url(#shieldStroke)" stroke-width="2"/>
          <!-- Lock body -->
          <rect x="75" y="110" width="50" height="42" rx="8" fill="url(#lockGrad)"/>
          <!-- Lock shackle -->
          <path d="M84 110 L84 95 Q84 78 100 78 Q116 78 116 95 L116 110"
            stroke="url(#shieldStroke)" stroke-width="5" stroke-linecap="round" fill="none"/>
          <!-- Lock keyhole -->
          <circle cx="100" cy="128" r="7" fill="white" opacity="0.9"/>
          <rect x="97" y="128" width="6" height="10" rx="3" fill="white" opacity="0.9"/>
          <!-- Shine -->
          <ellipse cx="70" cy="80" rx="14" ry="7" fill="white" opacity="0.2" transform="rotate(-30 70 80)"/>
          <defs>
            <linearGradient id="shieldGrad" x1="15" y1="10" x2="185" y2="220" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4285F4"/>
              <stop offset="100%" stop-color="#34A0D4"/>
            </linearGradient>
            <linearGradient id="shieldGrad2" x1="22" y1="18" x2="178" y2="212" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#5B9EF5"/>
              <stop offset="100%" stop-color="#2196F3"/>
            </linearGradient>
            <linearGradient id="shieldStroke" x1="0" y1="0" x2="200" y2="230" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4285F4"/>
              <stop offset="100%" stop-color="#1565C0"/>
            </linearGradient>
            <linearGradient id="lockGrad" x1="75" y1="110" x2="125" y2="152" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4285F4"/>
              <stop offset="100%" stop-color="#1565C0"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <!-- Bottom leaves decoration -->
      <svg style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);opacity:0.2;" width="120" height="40" viewBox="0 0 120 40">
        <ellipse cx="20" cy="30" rx="18" ry="10" fill="#4285F4" transform="rotate(-30 20 30)"/>
        <ellipse cx="40" cy="25" rx="14" ry="8" fill="#34A0D4" transform="rotate(-15 40 25)"/>
        <ellipse cx="80" cy="25" rx="14" ry="8" fill="#34A0D4" transform="rotate(15 80 25)"/>
        <ellipse cx="100" cy="30" rx="18" ry="10" fill="#4285F4" transform="rotate(30 100 30)"/>
      </svg>
    </div>

    <!-- Form Panel -->
    <div class="form-panel">

      <div class="alert error" id="alertBox">
        <span><i data-lucide="alert-triangle" style="width:1em;height:1em;vertical-align:-0.125em;display:inline-block;"></i></span>
        <span id="alertMsg">Invalid email or password. Please try again.</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">

        <div class="form-group">
          <label class="form-label" for="email">Admin Email</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="mail" style="width:1em;height:1em;vertical-align:-0.125em;display:inline-block;"></i></span>
            <input type="email" id="email" class="form-input"
              placeholder="admin@stresscare.ai" autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="lock" style="width:1em;height:1em;vertical-align:-0.125em;display:inline-block;"></i></span>
            <input type="password" id="password" class="form-input"
              placeholder="••••••••••" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw()" id="pwToggle" title="Show/hide password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="admin-forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          Login
        </button>

        <div class="security-note">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Secure admin access. All data is encrypted and protected.
        </div>

      </form>
    </div>
  </div>

  <div class="footer">© 2025 StressCare. All rights reserved.</div>

  <script>
    function togglePw() {
      const pw = document.getElementById('password');
      const btn = document.getElementById('pwToggle');
      if (pw.type === 'password') {
        pw.type = 'text';
        btn.style.color = '#4285F4';
      } else {
        pw.type = 'password';
        btn.style.color = '#9fa8da';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const alert = document.getElementById('alertBox');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      alert.classList.remove('show');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      setTimeout(() => {
        if (email === 'admin@stresscare.ai' && password === 'admin123') {
          sessionStorage.setItem('sc_admin_auth', JSON.stringify({
            name: 'Admin',
            email: email,
            loginTime: Date.now()
          }));
          btn.innerHTML = '✓ Success! Redirecting…';
          btn.style.background = 'linear-gradient(135deg,#43a047,#2e7d32)';
          setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1000);
        } else {
          document.getElementById('alertMsg').textContent = 'Invalid email or password. Please try again.';
          alert.classList.add('show');
          btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Login`;
          btn.disabled = false;
          btn.style.background = 'linear-gradient(135deg,#4285F4,#1a73e8)';
        }
      }, 1200);
    }
  </script>
</body>
</html>
